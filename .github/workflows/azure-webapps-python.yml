name: Build and deploy Python app to Azure Web App

env:
  AZURE_WEBAPP_NAME: nombre-de-tu-aplicacion # RECUERDA: Pon aquí el nombre exacto de tu app en Azure
  PYTHON_VERSION: '3.8'

on:
  push:
    branches: [ "main" ] # Cambia a "master" si esa es tu rama principal
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5 # Actualizado a v5 para quitar la advertencia amarilla
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          # Eliminamos la línea "cache: 'pip'" para que no busque el archivo antes de tiempo

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: |
          touch requirements.txt 
          pip install -r requirements.txt

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !venv/

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Development'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app
          path: .

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3 # Actualizado a v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
